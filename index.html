<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Game Store</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/login.css" />
</head>
<body class="login-page">

  <div class="login-logo">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="6" width="20" height="12" rx="3"/>
      <path d="M6 12h4M8 10v4"/>
      <circle cx="16" cy="11" r="1" fill="currentColor" stroke="none"/>
      <circle cx="18" cy="13" r="1" fill="currentColor" stroke="none"/>
    </svg>
    <h1>Game <span>Store</span></h1>
    <p>Entre na sua conta</p>
  </div>

  <div class="login-card">
    <div class="form-group">
      <label for="email">E-mail</label>
      <div class="input-wrap">
        <input
          type="email"
          id="email"
          placeholder="seu@email.com"
          autocomplete="email"
        />
      </div>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <div class="input-wrap">
        <input
          type="password"
          id="senha"
          class="has-toggle"
          autocomplete="current-password"
        />
        <button class="toggle-pw" id="togglePw" title="Mostrar/ocultar senha">
          <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <a href="#" class="forgot-link">Esqueci minha senha</a>

    <button class="btn-login" id="btnLogin">Entrar</button>

    <p class="login-footer-text">
      Não tem uma conta? <a href="cadastro.html">Criar conta</a>
    </p>
  </div>

  <p class="login-copyright">© 2026 Game Store</p>

  <div class="toast" id="toast"></div>

  <script src="js/login.js"></script>
</body>
</html>
