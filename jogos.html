<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jogos — Game Store</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/jogos.css" />
</head>
<body>

  <nav class="navbar">
    <a href="jogos.html" class="navbar-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="3"/>
        <path d="M6 12h4M8 10v4"/>
        <circle cx="16" cy="11" r="1" fill="currentColor" stroke="none"/>
        <circle cx="18" cy="13" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Game <span>Store</span>
    </a>

    <ul class="navbar-nav">
      <li><a href="jogos.html" class="active">Jogos</a></li>
      <li><a href="biblioteca.html">Biblioteca</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>

    <div class="navbar-actions">

      <button class="nav-icon-btn" title="Estatísticas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>

      <button class="nav-icon-btn" title="Lista de desejos" id="navWishlist">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>

      <button class="nav-icon-btn" title="Carrinho" id="navCart">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>

      <button class="nav-icon-btn" title="Perfil">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>

      <button class="nav-icon-btn" title="Sair" id="logoutBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="main-content">

    <div class="page-header">
      <h1>Jogos</h1>
      <p>Explore o catálogo completo de jogos.</p>
    </div>

    <div class="search-wrap">
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="Buscar jogos..."
        autocomplete="off"
      />
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </div>

    <div class="genre-filters" id="genreFilters">

    </div>

    <div class="results-info" id="resultsInfo"></div>

    <div class="games-grid" id="gamesGrid">

    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/jogos.js"></script>
</body>
</html>
