<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carrinho — Game Store</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/jogos.css" />
  <link rel="stylesheet" href="css/carrinho.css" />
</head>
<body>

  <nav class="navbar">
    <a href="jogos.html" class="navbar-logo">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="2" y="6" width="20" height="12" rx="3"/>
        <path d="M6 12h4M8 10v4"/>
        <circle cx="16" cy="11" r="1" fill="currentColor" stroke="none"/>
        <circle cx="18" cy="13" r="1" fill="currentColor" stroke="none"/>
      </svg>
      Game <span>Store</span>
    </a>
    <ul class="navbar-nav">
      <li><a href="jogos.html">Jogos</a></li>
      <li><a href="biblioteca.html">Biblioteca</a></li>
      <li><a href="admin.html">Admin</a></li>
    </ul>
    <div class="navbar-actions">
      <button class="nav-icon-btn" title="Estatísticas">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
        </svg>
      </button>
      <button class="nav-icon-btn" title="Lista de desejos">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      </button>
      <button class="nav-icon-btn active-page" title="Carrinho">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
          <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
      <button class="nav-icon-btn" title="Perfil">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <button class="nav-icon-btn" title="Sair" id="logoutBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </nav>

  <main class="main-content">
    <a href="jogos.html" class="back-link">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Continuar comprando
    </a>

    <h1 class="page-title">Carrinho</h1>

    <div class="cart-layout">
      <div class="cart-items" id="cartItems"></div>

      <div class="cart-summary">
        <div class="summary-total-row">
          <span>Total</span>
          <span class="summary-total-value" id="summaryTotal">R$ 0,00</span>
        </div>

        <p class="summary-info">Os jogos comprados entram automaticamente na sua biblioteca após o checkout.</p>

        <div class="payment-section">
          <h3>Método de pagamento</h3>

          <label class="payment-option">
            <input type="radio" name="payment" value="pix" checked />
            <div class="payment-option-body">
              <div class="payment-icon pix-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                </svg>
              </div>
              <div>
                <strong>Pix</strong>
                <p>Pagamento instantâneo para liberar sua compra em seguida.</p>
              </div>
            </div>
          </label>

          <label class="payment-option">
            <input type="radio" name="payment" value="cartao" />
            <div class="payment-option-body">
              <div class="payment-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/>
                </svg>
              </div>
              <div>
                <strong>Cartão</strong>
                <p>Use o fluxo simplificado da API para cartão de crédito.</p>
              </div>
            </div>
          </label>

          <label class="payment-option">
            <input type="radio" name="payment" value="boleto" />
            <div class="payment-option-body">
              <div class="payment-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="2" y="3" width="20" height="18" rx="2"/><line x1="8" y1="8" x2="8" y2="16"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="16" y1="8" x2="16" y2="16"/>
                </svg>
              </div>
              <div>
                <strong>Boleto</strong>
                <p>Geração simulada pelo backend da loja.</p>
              </div>
            </div>
          </label>
        </div>

        <button class="btn-checkout" id="btnCheckout">Finalizar Compra</button>
      </div>
    </div>

    <div class="cart-empty" id="cartEmpty" style="display:none">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <h3>Seu carrinho está vazio</h3>
      <p>Adicione jogos para continuar.</p>
      <a href="jogos.html" class="btn-go-shop">Ver Jogos</a>
    </div>
  </main>

  <div class="toast" id="toast"></div>

  <script src="js/data.js"></script>
  <script src="js/carrinho.js"></script>
</body>
</html>
